<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국회부산도서관 탐방 기록장</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: #ffffff;
            max-width: 500px;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 25px;
            box-sizing: border-box;
        }
        h1 {
            color: #1a365d;
            font-size: 24px;
            text-align: center;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #718096;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px dashed #e2e8f0;
        }
        h2 {
            font-size: 18px;
            color: #2b6cb0;
            margin-bottom: 15px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #4a5568;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .checklist-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            background: #edf2f7;
            padding: 12px;
            border-radius: 8px;
        }
        .checklist-item input[type="checkbox"] {
            margin-right: 10px;
            width: 20px;
            height: 20px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2b6cb0;
        }
        button:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏛️ 국회부산도서관 탐방</h1>
    <p class="subtitle">나만의 도서관 탐험 기록장</p>

    <div class="section">
        <h2>👤 내 정보</h2>
        <div class="input-group">
            <label for="student-info">학년 반 / 이름</label>
            <input type="text" id="student-info" placeholder="예: 2학년 3반 홍길동">
        </div>
    </div>

    <div class="section">
        <h2>✅ 탐방 미션 체크리스트</h2>
        <div class="checklist-item">
            <input type="checkbox" id="mission1">
            <label for="mission1">1층 기획전시실 관람하기</label>
        </div>
        <div class="checklist-item">
            <input type="checkbox" id="mission2">
            <label for="mission2">가장 읽어보고 싶은 영어 원서 찾기</label>
        </div>
        <div class="checklist-item">
            <input type="checkbox" id="mission3">
            <label for="mission3">도서관에서 가장 조용한 공간 찾아보기</label>
        </div>
    </div>

    <div class="section">
        <h2>📝 관람 기록</h2>
        <div class="input-group">
            <label for="book-title">발견한 흥미로운 책 제목 (영문/국문)</label>
            <input type="text" id="book-title" placeholder="책 제목을 적어주세요">
        </div>
        <div class="input-group">
            <label for="impression">가장 인상 깊었던 점</label>
            <textarea id="impression" placeholder="도서관의 시설이나 분위기 등 자유롭게 적어주세요."></textarea>
        </div>
    </div>

    <button id="submit-btn" onclick="sendData()">💾 실시간 기록 저장하기</button>
</div>

<script>
    // ⚠️ 중요: 본인의 Google Apps Script 웹 앱 URL을 아래에 붙여넣으세요.
    var WEB_APP_URL = "이곳에_복사한_웹_앱_URL을_넣으세요";

    function sendData() {
        const studentInfo = document.getElementById('student-info').value.trim();
        if (!studentInfo) {
            alert('학년 반과 이름을 입력해주세요!');
            return;
        }

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "전송 중...";

        const data = {
            studentInfo: studentInfo,
            mission1: document.getElementById('mission1').checked,
            mission2: document.getElementById('mission2').checked,
            mission3: document.getElementById('mission3').checked,
            bookTitle: document.getElementById('book-title').value,
            impression: document.getElementById('impression').value
        };

        // Apps Script로 데이터 전송 (Fetch API 사용)
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', // CORS 정책 우회를 위해 no-cors 설정
            cache: 'no-cache',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
        .then(() => {
            alert('탐방 기록이 선생님의 스프레드시트로 안전하게 저장되었습니다! 🎉');
            // 입력 폼 초기화
            document.getElementById('book-title').value = '';
            document.getElementById('impression').value = '';
            document.getElementById('mission1').checked = false;
            document.getElementById('mission2').checked = false;
            document.getElementById('mission3').checked = false;
        })
        .catch(error => {
            console.error('Error:', error);
            alert('오류가 발생했습니다. 네트워크 상태를 확인해주세요.');
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "💾 실시간 기록 저장하기";
        });
    }
</script>

</body>
</html>
